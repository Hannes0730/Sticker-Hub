name: Release Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate release token
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing secret: RELEASE_PAT"
            echo "Add it in Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Semantic release (tag/release only, protected-branch safe)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          python -m semantic_release version --no-commit --no-changelog --tag --push --vcs-release --skip-build
