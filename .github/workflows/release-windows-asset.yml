name: Build Windows Asset

on:
  push:
    tags:
      - "v*"
  release:
    types: [published, released, prereleased]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Resolve release tag
        id: resolve_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            "tag=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build StickerHub
        run: |
          python .\scripts\build_windows.py --clean

      - name: Zip build output
        shell: pwsh
        run: |
          Compress-Archive -Path .\dist\StickerHub\* -DestinationPath .\dist\StickerHub-win64.zip -Force

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: |
            dist/StickerHub-win64.zip
            dist/StickerHub/StickerHub.exe
